<!DOCTYPE html>
<html>
<head>
<title>Cyrene - Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron', Arial;
color:white;

background:
linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
url('City.jpg');

background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* ===== TOP BAR ===== */

.hamburger{
position:fixed;
top:20px;
left:20px;
font-size:28px;
color:#39ff14;
cursor:pointer;
z-index:1000;
}

.profileCircle{
position:fixed;
top:15px;
right:20px;
width:70px;
height:70px;
border-radius:50%;
background:black;
border:3px solid #a855ff;
box-shadow:0 0 20px #a855ff, 0 0 40px #a855ff;
}

/* ===== SIDEBAR ===== */

.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:black;
padding-top:100px;
transition:0.3s;
z-index:999;

box-shadow:0 0 30px #a855ff;
}

.sidebar button{
display:block;
width:80%;
margin:15px auto;
padding:15px;

background:black;
border:2px solid #39ff14;
color:#39ff14;

cursor:pointer;
font-family:'Orbitron';
font-size:14px;

box-shadow:0 0 10px #39ff14;
}

.sidebar button:hover{
background:#39ff14;
color:black;
}

/* ===== MAIN CONTENT ===== */

.main{
text-align:center;
padding-top:120px;
}

/* Welcome box */

.welcomeBox{
display:inline-block;
padding:20px 40px;
margin-bottom:60px;

background:black;
border-radius:10px;

box-shadow:
0 0 10px #a855ff,
0 0 30px #a855ff,
inset 0 0 10px #a855ff;

font-size:28px;
}

/* Character cards */

.characterContainer{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.characterCard{
width:200px;
height:260px;

display:flex;
align-items:center;
justify-content:center;

background:black;
border-radius:12px;

box-shadow:
0 0 15px #a855ff,
0 0 40px #a855ff;

color:#39ff14;
cursor:pointer;
}

/* ===== MOBILE ===== */

@media (max-width:768px){

.main{
padding-top:100px;
}

.welcomeBox{
font-size:20px;
width:85%;
}

.characterContainer{
flex-direction:column;
align-items:center;
gap:25px;
}

.characterCard{
width:80%;
max-width:260px;
height:180px;
}

.profileCircle{
width:60px;
height:60px;
}

.sidebar{
width:70%;
}

}

</style>
</head>

<body>

<!-- TOP -->
<div class="hamburger" onclick="toggleMenu()">☰</div>
<div class="profileCircle"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<button onclick="location.href='index.html'">Home</button>
<button>Quests (Coming Soon)</button>
<button>City Guide (Coming Soon)</button>
<button onclick="logout()">Log Out</button>
</div>

<!-- MAIN -->
<div class="main">

<div class="welcomeBox">
<span id="welcomeText">Welcome, User!</span>
</div>

<div class="characterContainer">

<div class="characterCard">+ Add Character</div>
<div class="characterCard">+ Add Character</div>
<div class="characterCard">+ Add Character</div>

</div>

</div>

<script>

/* MENU */
function toggleMenu(){
const menu = document.getElementById("sidebar");
menu.style.left = (menu.style.left === "0px") ? "-260px" : "0px";
}

/* USERNAME */
const username = localStorage.getItem("username");

if(username){
document.getElementById("welcomeText").innerText =
"Welcome, " + username + "!";
}

/* LOGOUT */
function logout(){
localStorage.removeItem("username");
window.location.href = "index.html";
}

</script>

</body>
</html>

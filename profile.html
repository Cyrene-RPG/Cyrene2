<!DOCTYPE html>
<html>

<head>
<title>Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

* {
box-sizing: border-box;
}

body{
margin:0;
font-family:'Orbitron', Arial;
color:white;

background:
linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
url('City.jpg');

background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:0;

width:200px;
height:100%;

background:rgba(0,0,0,0.8);

border-right:2px solid #7a00ff;

box-shadow:
0 0 20px #7a00ff,
inset 0 0 10px #7a00ff;

padding-top:100px;
}

/* SIDEBAR BUTTONS */

.sideBtn{
display:block;
width:85%;
margin:15px auto;
padding:12px;

background:black;
border:2px solid #39ff14;
color:#39ff14;

cursor:pointer;
text-align:center;

box-shadow:0 0 10px #39ff14;
transition:0.2s;
}

.sideBtn:hover{
background:#39ff14;
color:black;
}

/* MAIN CENTER AREA */

.mainWrapper{
margin-left:200px;
height:100vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* WELCOME */

.welcomeBox{
padding:15px 30px;
margin-bottom:40px;

border:2px solid #7a00ff;
border-radius:10px;

background:rgba(0,0,0,0.6);

box-shadow:
0 0 10px #7a00ff,
0 0 30px #7a00ff;

font-size:20px;
}

/* PROFILE ICON */

.profileIcon{
position:absolute;
top:20px;
right:20px;

width:60px;
height:60px;

border-radius:50%;
border:3px solid #7a00ff;

box-shadow:
0 0 10px #7a00ff,
0 0 30px #7a00ff;

background:black;
}

/* CHARACTER GRID */

.charGrid{
display:flex;
gap:25px;
}

/* CHARACTER BOX */

.charBox{
width:180px;
height:220px;

border:2px solid #7a00ff;
border-radius:12px;

background:rgba(0,0,0,0.6);

box-shadow:
0 0 10px #7a00ff,
0 0 40px #7a00ff,
inset 0 0 10px #7a00ff;

display:flex;
align-items:center;
justify-content:center;

color:#39ff14;
cursor:pointer;

transition:0.2s;
}

.charBox:hover{
background:#39ff14;
color:black;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<button class="sideBtn" onclick="location.href='index.html'">
Home
</button>

<button class="sideBtn">
Quests
</button>

<button class="sideBtn">
City Guide
</button>

<button class="sideBtn">
Log Out
</button>

</div>

<!-- PROFILE ICON -->
<div class="profileIcon"></div>

<!-- MAIN CONTENT -->
<div class="mainWrapper">

<div class="welcomeBox">
Welcome, User!
</div>

<div class="charGrid">

<div class="charBox">
+ Add Character
</div>

<div class="charBox">
+ Add Character
</div>

<div class="charBox">
+ Add Character
</div>

</div>

</div>

</body>

</html>

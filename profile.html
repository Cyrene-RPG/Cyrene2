<!DOCTYPE html>
<html>
<head>
<title>Cyrene - Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron', Arial;
color:white;

background:
linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
url('City.jpg');

background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* ===== TOP CENTER WELCOME ===== */

.topWelcome{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
z-index:1000;

padding:12px 30px;

background:black;
border-radius:10px;

box-shadow:
0 0 10px #a855ff,
0 0 25px #a855ff,
inset 0 0 10px #a855ff;

font-size:18px;
}

/* ===== TOP ICONS ===== */

.hamburger{
position:fixed;
top:60px;
left:15px;
font-size:26px;
color:#39ff14;
z-index:1000;
cursor:pointer;
}

.profileCircle{
position:fixed;
top:55px;
right:15px;
width:60px;
height:60px;
border-radius:50%;
background:black;
border:3px solid #a855ff;
box-shadow:0 0 20px #a855ff;
}

/* ===== SIDEBAR ===== */

.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:black;
padding-top:120px;
transition:0.3s;
z-index:999;

box-shadow:0 0 30px #a855ff;
}

.sidebar button{
display:block;
width:80%;
margin:12px auto;
padding:12px;

background:black;
border:2px solid #39ff14;
color:#39ff14;

cursor:pointer;
font-family:'Orbitron';

box-shadow:0 0 10px #39ff14;
}

.sidebar button:hover{
background:#39ff14;
color:black;
}

/* ===== MAIN ===== */

.main{
text-align:center;
padding-top:130px;
}

/* CHARACTER CONTAINER */

.characterContainer{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
}

/* CARDS */

.characterCard{
width:160px;
height:200px;

display:flex;
align-items:center;
justify-content:center;

background:black;
border-radius:12px;

box-shadow:
0 0 15px #a855ff,
0 0 30px #a855ff;

color:#39ff14;
font-size:14px;
cursor:pointer;
}

/* ===== MOBILE ===== */

@media (max-width:768px){

.topWelcome{
font-size:16px;
width:80%;
text-align:center;
}

.main{
padding-top:120px;
}

.characterContainer{
flex-direction:column;
align-items:center;
gap:18px;
}

.characterCard{
width:75%;
max-width:220px;
height:110px;
}

.profileCircle{
width:55px;
height:55px;
top:55px;
}

.hamburger{
top:60px;
}

}

</style>
</head>

<body>

<!-- TOP WELCOME -->
<div class="topWelcome">
<span id="welcomeText">Welcome, User!</span>
</div>

<!-- ICONS -->
<div class="hamburger" onclick="toggleMenu()">☰</div>
<div class="profileCircle"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<button onclick="location.href='index.html'">Home</button>
<button>Quests (Coming Soon)</button>
<button>City Guide (Coming Soon)</button>
<button onclick="logout()">Log Out</button>
</div>

<!-- MAIN -->
<div class="main">

<div class="characterContainer">
<div class="characterCard">+ Add Character</div>
<div class="characterCard">+ Add Character</div>
<div class="characterCard">+ Add Character</div>
</div>

</div>

<script>

function toggleMenu(){
const menu = document.getElementById("sidebar");
menu.style.left = (menu.style.left === "0px") ? "-260px" : "0px";
}

const username = localStorage.getItem("username");

if(username){
document.getElementById("welcomeText").innerText =
"Welcome, " + username + "!";
}

function logout(){
localStorage.removeItem("username");
window.location.href = "index.html";
}

</script>

</body>
</html>

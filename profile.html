<!DOCTYPE html>
<html>

<head>
<title>Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

* {
box-sizing: border-box;
}

body{
margin:0;
font-family:'Orbitron', Arial;
color:white;

background:
linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
url('City.jpg');

background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:0;

width:220px;
height:100%;

padding-top:120px;

background:rgba(0,0,0,0.9);

border-right:2px solid #7a00ff;

box-shadow:
0 0 25px #7a00ff,
inset 0 0 15px #7a00ff;

transition:0.3s;
}

/* BUTTONS */

.sideBtn{
display:block;
width:85%;
margin:18px auto;
padding:14px;

background:black;
border:2px solid #39ff14;
color:#39ff14;

cursor:pointer;
text-align:center;

box-shadow:
0 0 10px #39ff14,
inset 0 0 5px #39ff14;
}

.sideBtn:hover{
background:#39ff14;
color:black;
}

/* HAMBURGER */

.menuToggle{
display:none;
position:fixed;
top:15px;
left:15px;

font-size:28px;
color:#39ff14;
cursor:pointer;

z-index:1000;
text-shadow:0 0 10px #39ff14;
}

/* TOP BAR */

.topBar{
position:fixed;
top:0;
left:220px;
right:0;
height:100px;

display:flex;
justify-content:center;
align-items:center;
}

/* WELCOME */

.welcomeBox{
padding:15px 40px;

border:2px solid #7a00ff;
border-radius:10px;

background:rgba(0,0,0,0.7);

box-shadow:
0 0 10px #7a00ff,
0 0 40px #7a00ff;

font-size:22px;
}

/* PROFILE ICON */

.profileIcon{
position:fixed;
top:20px;
right:20px;

width:80px;
height:80px;

border-radius:50%;
border:3px solid #7a00ff;

box-shadow:
0 0 15px #7a00ff,
0 0 40px #7a00ff;

background:black;
}

/* MAIN */

.main{
margin-left:220px;
margin-top:220px;

display:flex;
justify-content:center;
}

/* CHAR GRID */

.charGrid{
display:flex;
gap:30px;
}

/* CHAR BOX */

.charBox{
width:180px;
height:220px;

border:2px solid #7a00ff;
border-radius:12px;

background:rgba(0,0,0,0.6);

box-shadow:
0 0 15px #7a00ff,
0 0 50px #7a00ff,
inset 0 0 10px #7a00ff;

display:flex;
align-items:center;
justify-content:center;

color:#39ff14;
cursor:pointer;
}

/* ===== MOBILE ===== */

@media (max-width: 768px){

/* SHOW MENU BUTTON */
.menuToggle{
display:block;
}

/* HIDE SIDEBAR */
.sidebar{
left:-220px;
}

/* OPEN SIDEBAR */
.sidebar.active{
left:0;
}

/* REMOVE SHIFT */
.topBar{
left:0;
top:80px;
}

.main{
margin-left:0;
margin-top:180px;
}

/* PROFILE ICON */
.profileIcon{
top:15px;
right:15px;
width:55px;
height:55px;
}

/* STACK */
.charGrid{
flex-direction:column;
align-items:center;
gap:25px;
}

/* SIZE */
.charBox{
width:85%;
max-width:280px;
height:180px;
}

}

</style>

</head>

<body>

<!-- MENU BUTTON -->
<div class="menuToggle" onclick="toggleMenu()">☰</div>

<!-- SIDEBAR -->
<div class="sidebar">
<button class="sideBtn">Home</button>
<button class="sideBtn">Quests</button>
<button class="sideBtn">City Guide</button>
<button class="sideBtn">Log Out</button>
</div>

<!-- PROFILE -->
<div class="profileIcon"></div>

<!-- WELCOME -->
<div class="topBar">
<div class="welcomeBox">Welcome, User!</div>
</div>

<!-- MAIN -->
<div class="main">
<div class="charGrid">

<div class="charBox">+ Add Character</div>
<div class="charBox">+ Add Character</div>
<div class="charBox">+ Add Character</div>

</div>
</div>

<script>
function toggleMenu(){
document.querySelector('.sidebar').classList.toggle('active');
}
</script>

</body>
</html>

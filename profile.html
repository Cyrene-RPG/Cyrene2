<!DOCTYPE html>
<html>

<head>
<title>Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

* {
box-sizing: border-box;
}

body{
margin:0;
font-family:'Orbitron', Arial;
color:white;

background:
linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
url('City.jpg');

background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* TOP BAR */

.topBar{
position:relative;
width:100%;
padding:20px 0;
text-align:center;
}

/* PROFILE ICON (TOP RIGHT) */

.profileIcon{
position:absolute;
top:20px;
right:20px;

width:60px;
height:60px;
border-radius:50%;

border:3px solid #7a00ff;

box-shadow:
0 0 10px #7a00ff,
0 0 30px #7a00ff;

background:black;
}

/* WELCOME BOX */

.welcomeBox{
display:inline-block;
padding:15px 30px;

border:2px solid #7a00ff;
border-radius:10px;

background:rgba(0,0,0,0.6);

box-shadow:
0 0 10px #7a00ff,
0 0 30px #7a00ff;

font-size:20px;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:0;

width:180px;
height:100%;

padding-top:120px;

background:rgba(0,0,0,0.7);

border-right:2px solid #7a00ff;

box-shadow:0 0 20px #7a00ff;
}

/* SIDEBAR BUTTONS */

.sideBtn{
display:block;
width:100%;
padding:15px;

border:none;
background:black;
color:#39ff14;

cursor:pointer;

border-bottom:1px solid #7a00ff;

text-align:left;

box-shadow:0 0 10px #39ff14;
}

.sideBtn:hover{
background:#39ff14;
color:black;
}

/* MAIN AREA */

.main{
margin-left:200px;
padding:40px;
text-align:center;
}

/* CHARACTER GRID */

.charGrid{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

/* CHARACTER BOX */

.charBox{
width:180px;
height:220px;

border:2px solid #7a00ff;
border-radius:10px;

background:rgba(0,0,0,0.6);

box-shadow:
0 0 10px #7a00ff,
0 0 30px #7a00ff,
inset 0 0 10px #7a00ff;

display:flex;
align-items:center;
justify-content:center;

color:#39ff14;
cursor:pointer;
}

.charBox:hover{
background:#39ff14;
color:black;
}

</style>

</head>

<body>

<!-- TOP BAR -->
<div class="topBar">

<div class="welcomeBox">
Welcome, User!
</div>

<div class="profileIcon"></div>

</div>

<!-- SIDEBAR -->
<div class="sidebar">

<button class="sideBtn" onclick="location.href='index.html'">
Home
</button>

<button class="sideBtn">
Quests (Coming Soon)
</button>

<button class="sideBtn">
City Guide (Coming Soon)
</button>

<button class="sideBtn">
Log Out
</button>

</div>

<!-- MAIN CONTENT -->
<div class="main">

<div class="charGrid">

<div class="charBox">
+ Add Character
</div>

<div class="charBox">
+ Add Character
</div>

<div class="charBox">
+ Add Character
</div>

</div>

</div>

</body>

</html>

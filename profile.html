<!DOCTYPE html>
<html>

<head>
<title>Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

* {
box-sizing: border-box;
}

body{
margin:0;
font-family:'Orbitron', Arial;
color:white;

background:
linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
url('City.jpg');

background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* SIDEBAR (UPGRADED) */

.sidebar{
position:fixed;
top:0;
left:0;

width:220px;
height:100%;

padding-top:120px;

background:rgba(0,0,0,0.85);

border-right:2px solid #7a00ff;

box-shadow:
0 0 25px #7a00ff,
inset 0 0 15px #7a00ff;
}

/* SIDEBAR BUTTONS (BETTER LOOK) */

.sideBtn{
display:block;
width:85%;
margin:18px auto;
padding:14px;

background:black;
border:2px solid #39ff14;
color:#39ff14;

cursor:pointer;
text-align:center;

box-shadow:
0 0 10px #39ff14,
inset 0 0 5px #39ff14;

transition:0.2s;
}

.sideBtn:hover{
background:#39ff14;
color:black;
box-shadow:
0 0 20px #39ff14;
}

/* TOP BAR */

.topBar{
position:fixed;
top:0;
left:220px;
right:0;
height:100px;

display:flex;
justify-content:center;
align-items:center;

}

/* WELCOME BOX (TOP CENTER) */

.welcomeBox{
padding:15px 40px;

border:2px solid #7a00ff;
border-radius:10px;

background:rgba(0,0,0,0.7);

box-shadow:
0 0 10px #7a00ff,
0 0 40px #7a00ff;

font-size:22px;
}

/* PROFILE ICON (BIGGER + CLEANER) */

.profileIcon{
position:fixed;
top:20px;
right:20px;

width:80px;
height:80px;

border-radius:50%;
border:3px solid #7a00ff;

box-shadow:
0 0 15px #7a00ff,
0 0 40px #7a00ff;

background:black;
}

/* MAIN CONTENT */

.main{
margin-left:220px;
margin-top:220px; /* MORE SPACE */

display:flex;
justify-content:center;
}

/* CHARACTER GRID */

.charGrid{
display:flex;
gap:30px;
}

/* CHARACTER BOX */

.charBox{
width:180px;
height:220px;

border:2px solid #7a00ff;
border-radius:12px;

background:rgba(0,0,0,0.6);

box-shadow:
0 0 15px #7a00ff,
0 0 50px #7a00ff,
inset 0 0 10px #7a00ff;

display:flex;
align-items:center;
justify-content:center;

color:#39ff14;
cursor:pointer;

transition:0.2s;
}

.charBox:hover{
background:#39ff14;
color:black;
box-shadow:
0 0 25px #39ff14;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<button class="sideBtn" onclick="location.href='index.html'">
Home
</button>

<button class="sideBtn">
Quests
</button>

<button class="sideBtn">
City Guide
</button>

<button class="sideBtn">
Log Out
</button>

</div>

<!-- TOP BAR -->
<div class="topBar">
    <div class="welcomeBox">
        Welcome, User!
    </div>
</div>

<!-- PROFILE ICON -->
<div class="profileIcon"></div>

<!-- MAIN CONTENT -->
<div class="main">

<div class="charGrid">

<div class="charBox">
+ Add Character
</div>

<div class="charBox">
+ Add Character
</div>

<div class="charBox">
+ Add Character
</div>

</div>

</div>

</body>

</html>

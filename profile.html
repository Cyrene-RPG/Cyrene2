<!DOCTYPE html>
<html>
<head>
  <title>Cyrene - Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

  <style>
  body{
    margin:0;
    font-family:'Orbitron', Arial, sans-serif;
    color:white;

    background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url('City.jpg');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
  }

  .topWelcome{
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    z-index:1000;

    padding:12px 30px;
    background:black;
    border-radius:10px;

    box-shadow:
    0 0 10px #a855ff,
    0 0 25px #a855ff,
    inset 0 0 10px #a855ff;

    font-size:18px;
  }

  .hamburger{
    position:fixed;
    top:60px;
    left:15px;
    font-size:26px;
    color:#39ff14;
    cursor:pointer;
    z-index:1000;
  }

  .profileCircle{
    position:fixed;
    top:55px;
    right:15px;
    width:60px;
    height:60px;
    border-radius:50%;
    border:3px solid #a855ff;
    box-shadow:0 0 20px #a855ff;
    object-fit:cover;
    background:black;
  }

  .sidebar{
    position:fixed;
    top:0;
    left:-260px;
    width:260px;
    height:100%;
    background:black;
    padding-top:120px;
    transition:0.3s;
    z-index:999;

    box-shadow:0 0 30px #a855ff;
  }

  .sidebar button{
    display:block;
    width:80%;
    margin:12px auto;
    padding:12px;

    background:black;
    border:2px solid #39ff14;
    color:#39ff14;

    cursor:pointer;
    box-shadow:0 0 10px #39ff14;
  }

  .main{
    padding-top:140px;
    text-align:center;
  }

  .uploadBox{
    margin-top:20px;
  }

  input[type="file"]{
    color:#39ff14;
  }

  .uploadBtn{
    margin-top:10px;
    padding:10px;

    background:black;
    border:2px solid #39ff14;
    color:#39ff14;

    cursor:pointer;
    box-shadow:0 0 10px #39ff14;
  }

  </style>
</head>

<body>

<!-- TOP -->
<div class="topWelcome">
  <span id="welcomeText">Welcome...</span>
</div>

<!-- ICONS -->
<div class="hamburger" onclick="toggleMenu()">☰</div>
<img id="profilePic" class="profileCircle">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <button onclick="location.href='index.html'">Home</button>
  <button>Quests (Coming Soon)</button>
  <button>City Guide (Coming Soon)</button>
  <button onclick="logout()">Log Out</button>
</div>

<!-- MAIN -->
<div class="main">

  <div class="uploadBox">
    <input type="file" id="fileInput">
    <br>
    <button class="uploadBtn" onclick="uploadPic()">Upload Profile Picture</button>
  </div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBQDReiSnFX3cs9Y4QW70cWQKblPe0-IPQ",
  authDomain: "cyrene-8f351.firebaseapp.com",
  projectId: "cyrene-8f351",
  storageBucket: "cyrene-8f351.appspot.com",
  messagingSenderId: "574109223643",
  appId: "1:574109223643:web:1d713a3c5f1503c7fbdafe"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let currentUser = null;

// LOAD USER
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;

    const docRef = doc(db, "users", user.uid);
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {
      const data = docSnap.data();

      document.getElementById("welcomeText").innerText =
        "Welcome, " + data.username + "!";

      if (data.photoURL) {
        document.getElementById("profilePic").src = data.photoURL;
      }
    }

  } else {
    window.location.href = "index.html";
  }
});

// UPLOAD PROFILE PIC
window.uploadPic = async function(){
  const file = document.getElementById("fileInput").files[0];

  if (!file || !currentUser) return;

  const storageRef = ref(storage, "profilePics/" + currentUser.uid);

  await uploadBytes(storageRef, file);

  const url = await getDownloadURL(storageRef);

  // Save URL in Firestore
  await updateDoc(doc(db, "users", currentUser.uid), {
    photoURL: url
  });

  document.getElementById("profilePic").src = url;
};

// SIDEBAR
window.toggleMenu = function(){
  const menu = document.getElementById("sidebar");
  menu.style.left = (menu.style.left === "0px") ? "-260px" : "0px";
};

// LOGOUT
window.logout = function(){
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
};
</script>

</body>
</html>

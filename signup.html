<!DOCTYPE html>
<html>

<head>
<title>Create Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>

<style>
body{
margin:0;
font-family:'Orbitron', Arial;
color:white;
text-align:center;

background:
linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
url('City.jpg');
}

.box{
margin:100px auto;
width:90%;
max-width:350px;
padding:25px;

background:black;
border-radius:10px;

box-shadow:0 0 20px #a855ff;
}

input{
width:100%;
padding:12px;
margin:10px 0;

background:black;
border:2px solid #39ff14;
color:#39ff14;
}

button{
width:100%;
padding:12px;

background:black;
border:2px solid #39ff14;
color:#39ff14;

cursor:pointer;
}
</style>

</head>

<body>

<div class="box">

<h2>Create Account</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>

</div>

<script>

// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyBQDReiSnFX3cs9Y4QW70cWQKblPe0-IPQ",
  authDomain: "cyrene-8f351.firebaseapp.com",
  projectId: "cyrene-8f351",
  storageBucket: "cyrene-8f351.firebasestorage.app",
  messagingSenderId: "574109223643",
  appId: "1:574109223643:web:49c45a3e2395077bfbdafe"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);

// INIT
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// SIGNUP FUNCTION
function signup(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

auth.createUserWithEmailAndPassword(email, password)
.then((userCredential) => {

    const user = userCredential.user;

    // Save username locally (for now)
    localStorage.setItem("username", email);

    window.location.href = "profile.html";

})
.catch((error) => {
    alert(error.message);
});

}

</script>

</body>

</html>

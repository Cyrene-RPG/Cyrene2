<!DOCTYPE html>
<html>
<head>
  <title>Register Identity</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- NO CACHE -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

  <style>
  body{
    margin:0;
    font-family:'Orbitron', Arial, sans-serif;
    color:white;

    background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url('City.jpg');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
  }

  .title{
    text-align:center;
    margin-top:60px;
    font-size:48px;
    color:#a855ff;
    text-shadow:0 0 20px #7a00ff, 0 0 40px #7a00ff;
  }

  .subtitle{
    text-align:center;
    color:#39ff14;
    margin-top:10px;
    font-size:18px;
    text-shadow:0 0 10px #39ff14;
  }

  .systemBox{
    margin:60px auto;
    width:90%;
    max-width:400px;
    padding:30px;

    border:2px solid #7a00ff;
    border-radius:12px;

    box-shadow:
    0 0 10px #7a00ff,
    0 0 40px #7a00ff,
    inset 0 0 10px #7a00ff;

    background:rgba(0,0,0,0.6);

    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .systemText{
    color:#39ff14;
    margin-bottom:20px;
    font-size:14px;
    width:100%;
  }

  .menuButton{
    display:block;
    width:100%;
    max-width:320px;

    padding:14px;
    margin:10px auto;

    background:black;
    border:2px solid #39ff14;
    color:#39ff14;

    cursor:pointer;

    text-align:left;

    box-shadow:0 0 10px #39ff14;
  }

  .menuButton:hover{
    background:#39ff14;
    color:black;
  }

  input.menuButton{
    text-align:left;
  }

  .returnSmall{
    margin-top:12px;
    font-size:12px;
    color:#777;
    cursor:pointer;
  }

  .returnSmall:hover{
    color:white;
  }

  </style>
</head>

<body>

<div class="title">CYRENE</div>
<div class="subtitle">Identity Registration</div>

<div class="systemBox">

  <div class="systemText">
    [ SYSTEM ONLINE ]<br>
    [ REGISTER NEW USER ]
  </div>

  <input id="username" class="menuButton" placeholder="Username">
  <input id="email" class="menuButton" placeholder="Email">
  <input id="password" type="password" class="menuButton" placeholder="Password">

  <button class="menuButton" onclick="signup()">
    > INITIALIZE IDENTITY
  </button>

  <div class="returnSmall" onclick="location.href='index.html'">
    ← Return
  </div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBQDReiSnFX3cs9Y4QW70cWQKblPe0-IPQ",
  authDomain: "cyrene-8f351.firebaseapp.com",
  projectId: "cyrene-8f351",
  storageBucket: "cyrene-8f351.firebasestorage.app",
  messagingSenderId: "574109223643",
  appId: "1:574109223643:web:1d713a3c5f1503c7fbdafe"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.signup = async function() {
  const username = document.getElementById("username").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const userCred = await createUserWithEmailAndPassword(auth, email, password);

    await setDoc(doc(db, "users", userCred.user.uid), {
      username: username,
      email: email
    });

    window.location.href = "profile.html";

  } catch (err) {
    alert(err.message);
  }
};
</script>

</body>
</html>

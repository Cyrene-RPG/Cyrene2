<!DOCTYPE html>
<html>
<head>
<title>City Information</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron';
color:white;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.85),rgba(0,0,0,0.95)),
url('City.jpg');
background-size:cover;
}

/* TITLE */
.title{
margin-top:60px;
font-size:28px;
color:#39ff14;
text-shadow:0 0 12px #39ff14;
}

/* MENU BUTTONS */
.menuBtn{
width:85%;
max-width:420px;
margin:18px auto;
padding:18px;
font-size:16px;

background:black;
border:2px solid #39ff14;
color:#39ff14;

border-radius:14px;

box-shadow:
0 0 10px #39ff14,
0 0 25px #39ff14;

cursor:pointer;
transition:0.2s;
}

.menuBtn:hover{
background:#39ff14;
color:black;
}

/* BACK BUTTON */
.backBtn{
margin-top:40px;
padding:14px 25px;
background:black;
border:2px solid #7a00ff;
color:#b388ff;

border-radius:12px;

box-shadow:
0 0 10px #7a00ff,
0 0 20px #7a00ff;

cursor:pointer;
}
</style>
</head>

<body>

<div class="title">City Information</div>

<!-- ✅ CORRECT LINK -->
<button class="menuBtn" onclick="openCityInfo()">
🏙️ City Info
</button>

<button class="menuBtn">
🧬 Species Information
</button>

<button class="menuBtn">
⚔️ Class Information
</button>

<button class="menuBtn">
🎒 Item Information
</button>

<button class="menuBtn">
✨ Spells List
</button>

<button class="backBtn" onclick="goBack()">← Back</button>

<script>

/* ✅ GO TO YOUR ACTUAL PAGE */
function openCityInfo(){
location.href = "city-info.html";
}

function goBack(){
location.href = "profile.html";
}

</script>

</body>
</html>

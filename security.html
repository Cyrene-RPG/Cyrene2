<!DOCTYPE html>
<html>
<head>
<title>Account Settings</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
body{
margin:0;
font-family:'Orbitron', sans-serif;
background:#050505;
color:#d8d8d8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* ===== BOX ===== */
.container{
width:360px;
background:#000;
padding:25px;
border-radius:18px;
border:2px solid #a020f0;
box-shadow:0 0 15px #a020f0;
}

/* ===== TITLE ===== */
h2{
text-align:center;
color:#39ff14;
margin-bottom:20px;
text-shadow:0 0 10px #39ff14;
}

/* ===== INPUT ===== */
input{
width:100%;
padding:12px;
margin:10px 0;
background:black;
border:2px solid #39ff14;
color:#39ff14;
border-radius:10px;
}

/* ===== BUTTON ===== */
button{
width:100%;
padding:12px;
margin-top:10px;
background:black;
border:2px solid #39ff14;
color:#39ff14;
border-radius:10px;
cursor:pointer;
}

button:hover{
box-shadow:0 0 10px #39ff14;
}

/* ===== MESSAGE ===== */
.msg{
margin-top:10px;
text-align:center;
font-size:14px;
min-height:20px;
}

</style>
</head>

<body>

<div class="container">

<h2>Account Settings</h2>

<!-- USERNAME -->
<input type="text" id="username" placeholder="New Username">
<button onclick="updateUsername()">Update Username</button>

<!-- PASSWORD -->
<input type="password" id="password" placeholder="New Password">
<button onclick="updatePassword()">Update Password</button>

<div class="msg" id="msg"></div>

<button onclick="goBack()">← Back</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getAuth,
  updatePassword,
  updateProfile,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ===== FIREBASE CONFIG ===== */
const firebaseConfig = {
  apiKey: "AIzaSyBQDReiSnFX3cs9Y4QW70cWQKblPe0-IPQ",
  authDomain: "cyrene-8f351.firebaseapp.com",
  projectId: "cyrene-8f351",
  storageBucket: "cyrene-8f351.appspot.com",
  messagingSenderId: "574109223643",
  appId: "1:574109223643:web:1d713a3c5f1503c7fbdafe"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const msg = document.getElementById("msg");

/* ===== 🔐 BLOCK ACCESS ===== */
onAuthStateChanged(auth, (user)=>{
  if(!user){
    window.location.href = "login.html";
  }
});

/* ===== USERNAME UPDATE ===== */
window.updateUsername = async function(){

  const user = auth.currentUser;
  const newName = document.getElementById("username").value.trim();

  if(!newName){
    msg.innerText = "Enter a username.";
    return;
  }

  try{

    /* update auth */
    await updateProfile(user, {
      displayName: newName
    });

    /* update database */
    await updateDoc(doc(db, "users", user.uid), {
      username: newName
    });

    msg.innerText = "Username updated!";

    setTimeout(()=>{
      location.reload();
    }, 1000);

  }catch(e){
    msg.innerText = e.message;
  }
};

/* ===== PASSWORD UPDATE ===== */
window.updatePassword = async function(){

  const user = auth.currentUser;
  const newPass = document.getElementById("password").value;

  if(!newPass){
    msg.innerText = "Enter a password.";
    return;
  }

  try{

    await updatePassword(user, newPass);

    msg.innerText = "Password updated. Logging out...";

    setTimeout(async ()=>{
      await signOut(auth);
      window.location.href = "login.html";
    }, 1500);

  }catch(e){
    msg.innerText = e.message;
  }
};

/* ===== BACK ===== */
window.goBack = function(){
  window.location.href = "profile.html";
};

</script>

</body>
</html>

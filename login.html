<!DOCTYPE html>
<html>
<head>
<title>Cyrene - Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron';
color:white;
text-align:center;
background:linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),url('City.jpg');
background-size:cover;
}

.title{margin-top:60px;font-size:48px;color:#a855ff;text-shadow:0 0 20px #7a00ff;}
.subtitle{color:#39ff14;margin-top:10px;}

.box{
margin:60px auto;
width:90%;max-width:400px;
padding:30px;
border:2px solid #7a00ff;
border-radius:12px;
background:rgba(0,0,0,0.6);
}

input{
width:100%;padding:12px;margin:10px 0;
background:black;border:2px solid #39ff14;color:#39ff14;
}

button{
width:100%;padding:14px;margin-top:15px;
background:black;border:2px solid #39ff14;color:#39ff14;
}

.link{margin-top:15px;color:#888;cursor:pointer;}
</style>
</head>

<body>

<div class="title">CYRENE</div>
<div class="subtitle">Access Terminal</div>

<div class="box">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">LOGIN</button>
<div class="link" onclick="location.href='signup.html'">Create Account</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword,
setPersistence,
browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyBQDReiSnFX3cs9Y4QW70cWQKblPe0-IPQ",
authDomain:"cyrene-8f351.firebaseapp.com",
projectId:"cyrene-8f351",
storageBucket:"cyrene-8f351.appspot.com",
messagingSenderId:"574109223643",
appId:"1:574109223643:web:1d713a3c5f1503c7fbdafe"
};

/* 🔥 SINGLE APP NAME */
const app = initializeApp(firebaseConfig, "MAIN");
const auth = getAuth(app);

/* 🔥 FORCE PERSISTENCE */
await setPersistence(auth, browserLocalPersistence);

window.login = async ()=>{
let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

try{
let user=await signInWithEmailAndPassword(auth,email,pass);
if(user) location.href="profile.html";
}catch(e){alert(e.message);}
};
</script>

</body>
</html>

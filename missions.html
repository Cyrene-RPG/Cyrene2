<!DOCTYPE html>
<html>
<head>
<title>Missions Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron';
color:white;
background:
linear-gradient(rgba(0,0,0,0.9),rgba(0,0,0,0.95)),
url('City.jpg');
background-size:cover;
}

.header{
display:flex;
justify-content:center;
position:relative;
margin-top:20px;
}

.title{
font-size:28px;
color:#39ff14;
border:2px solid #39ff14;
padding:10px 20px;
box-shadow:0 0 12px #39ff14;
}

.back{
position:absolute;
left:20px;
padding:8px 16px;
border:2px solid #39ff14;
color:#39ff14;
background:black;
cursor:pointer;
}

.container{
display:flex;
justify-content:center;
gap:40px;
margin-top:50px;
flex-wrap:wrap;
}

.column{
min-width:280px;
max-width:400px;
}

.sectionTitle{
text-align:center;
margin-bottom:20px;
padding:10px;
border:2px solid #39ff14;
}

.mission{
padding:15px;
margin-bottom:15px;
border-radius:20px;
border:2px solid #39ff14;
background:black;
cursor:pointer;
text-align:center;
}

.locked{
border:2px solid #555;
color:#777;
cursor:default;
}

/* POPUP */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.popup{
width:90%;
max-width:350px;
padding:20px;
background:black;
border:2px solid #7a00ff;
border-radius:14px;
box-shadow:0 0 25px #7a00ff;
text-align:center;
}

button{
margin-top:10px;
padding:12px;
width:100%;
background:black;
border:2px solid #39ff14;
color:#39ff14;
cursor:pointer;
border-radius:10px;
}

@media(max-width:700px){
.container{
flex-direction:column;
align-items:center;
}
}
</style>
</head>

<body>

<div class="header">
<button class="back" onclick="location.href='profile.html'">Back</button>
<div class="title">Missions Hub</div>
</div>

<div class="container">

<div class="column">
<div class="sectionTitle">Unlocked</div>

<div class="mission" onclick="openMission(1)">
Welcome to Cyrene
</div>

</div>

<div class="column">
<div class="sectionTitle">Locked</div>

<div class="mission locked">???????</div>
</div>

</div>

<div id="overlay" class="overlay"></div>

<!-- 🔥 FIREBASE SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* YOUR CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBQDReiSnFX3cs9Y4QW70cWQKblPe0-IPQ",
  authDomain: "cyrene-8f351.firebaseapp.com",
  projectId: "cyrene-8f351",
  storageBucket: "cyrene-8f351.firebasestorage.app",
  messagingSenderId: "574109223643",
  appId: "1:574109223643:web:1d713a3c5f1503c7fbdafe"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔊 SOUND */
let clickSound = new Audio("click.mp3");
let openSound = new Audio("open.mp3");

/* TEMP USER ID (replace later with auth) */
let userId = "player1";

/* ================= OPEN MISSION ================= */
async function openMission(id){

openSound.play();

let ref = doc(db, "users", userId);
let snap = await getDoc(ref);

let progress = null;

if(snap.exists()){
progress = snap.data()["mission_"+id];
}

let content = "";

if(progress === "started"){
content = `
<div>Welcome to Cyrene</div>

<button onclick="resumeMission(${id})">Resume</button>
<button onclick="restartMission(${id})">Start Over</button>
<button onclick="closePopup()">Close</button>
`;
}else{
content = `
<div>Welcome to Cyrene</div>

<button onclick="startMission(${id})">Start</button>
<button onclick="closePopup()">Close</button>
`;
}

showPopup(content);
}

/* ================= POPUP ================= */
function showPopup(html){
let o = document.getElementById("overlay");
o.style.display = "flex";
o.innerHTML = `<div class="popup">${html}</div>`;
}

function closePopup(){
document.getElementById("overlay").style.display = "none";
}

/* ================= ACTIONS ================= */

async function startMission(id){
clickSound.play();

await setDoc(doc(db, "users", userId), {
["mission_"+id]: "started"
}, { merge:true });

location.href = "mission1.html";
}

function resumeMission(id){
clickSound.play();
location.href = "mission1.html";
}

async function restartMission(id){
clickSound.play();

await setDoc(doc(db, "users", userId), {
["mission_"+id]: "started"
}, { merge:true });

location.href = "mission1.html";
}

/* MAKE GLOBAL */
window.openMission = openMission;
window.startMission = startMission;
window.resumeMission = resumeMission;
window.restartMission = restartMission;
window.closePopup = closePopup;

</script>

</body>
</html>

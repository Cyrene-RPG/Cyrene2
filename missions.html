<!DOCTYPE html>
<html>
<head>
<title>Missions Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron';
color:white;
background:
linear-gradient(rgba(0,0,0,0.9),rgba(0,0,0,0.95)),
url('City.jpg');
background-size:cover;
}

/* BACK BUTTON */
.back{
position:absolute;
top:20px;
left:20px;
padding:10px 25px;
border:2px solid #39ff14;
background:black;
color:#39ff14;
box-shadow:0 0 10px #39ff14;
cursor:pointer;
}

/* TITLE */
.title{
text-align:center;
margin-top:80px;
font-size:36px;
color:#39ff14;
text-shadow:0 0 15px #39ff14;
}

/* MAIN CONTAINER */
.container{
margin-top:80px;
display:flex;
justify-content:center;
gap:120px;
flex-wrap:wrap;
}

/* COLUMN */
.section{
text-align:center;
}

/* COLUMN TITLE */
.sectionTitle{
margin-bottom:20px;
padding:10px 30px;
border:2px solid #39ff14;
box-shadow:0 0 10px #39ff14;
display:inline-block;
}

/* MISSION BUTTON */
.mission{
margin-top:10px;
padding:15px 30px;
border-radius:20px;
border:2px solid #39ff14;
background:black;
cursor:pointer;
box-shadow:0 0 10px #39ff14;
transition:0.2s;
}

.mission:hover{
box-shadow:0 0 20px #39ff14;
}

/* LOCKED */
.locked{
border:2px solid #777;
color:#777;
box-shadow:none;
cursor:default;
}

/* MOBILE */
@media(max-width:700px){

.title{
font-size:26px;
margin-top:100px;
}

.container{
flex-direction:column;
gap:40px;
align-items:center;
}

.back{
top:15px;
left:15px;
}
}
</style>
</head>

<body>

<button class="back" onclick="goBack()">Back</button>

<div class="title">Missions Hub</div>

<div class="container">

<div class="section">
<div class="sectionTitle">Unlocked</div>

<div class="mission" onclick="startMission()">
Welcome to Cyrene
</div>
</div>

<div class="section">
<div class="sectionTitle">Locked</div>

<div class="mission locked">
???????
</div>
</div>

</div>

<script>

function goBack(){
location.href="profile.html";
}

function startMission(){
location.href="mission1.html";
}

</script>

</body>
</html>

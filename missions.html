<!DOCTYPE html>
<html>
<head>
<title>Missions Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron';
color:white;
background:
linear-gradient(rgba(0,0,0,0.9),rgba(0,0,0,0.95)),
url('City.jpg');
background-size:cover;
}

/* HEADER */
.header{
display:flex;
align-items:center;
justify-content:center;
position:relative;
margin-top:20px;
}

.title{
font-size:28px;
color:#39ff14;
text-shadow:0 0 12px #39ff14;
border:2px solid #39ff14;
padding:10px 20px;
box-shadow:0 0 12px #39ff14;
}

/* BACK BUTTON */
.back{
position:absolute;
left:20px;
top:0;
padding:8px 16px;
border:2px solid #39ff14;
color:#39ff14;
background:black;
cursor:pointer;
box-shadow:0 0 10px #39ff14;
}

/* LAYOUT */
.container{
display:flex;
justify-content:center;
gap:40px;
margin-top:50px;
padding:0 20px;
flex-wrap:wrap;
}

/* COLUMN */
.column{
flex:1;
min-width:280px;
max-width:400px;
}

/* SECTION TITLE */
.sectionTitle{
text-align:center;
margin-bottom:20px;
padding:10px;
border:2px solid #39ff14;
box-shadow:0 0 10px #39ff14;
}

/* MISSION BUTTON */
.mission{
padding:15px;
margin-bottom:15px;
border-radius:20px;
border:2px solid #39ff14;
background:black;
cursor:pointer;
text-align:center;
box-shadow:0 0 10px #39ff14;
transition:0.2s;
}

.mission:hover{
box-shadow:0 0 20px #39ff14;
}

/* LOCKED */
.locked{
border:2px solid #555;
color:#777;
box-shadow:none;
cursor:default;
}

/* MOBILE */
@media(max-width:700px){
.container{
flex-direction:column;
align-items:center;
}
}
</style>
</head>

<body>

<div class="header">
<button class="back" onclick="location.href='profile.html'">Back</button>
<div class="title">Missions Hub</div>
</div>

<div class="container">

<!-- UNLOCKED -->
<div class="column">
<div class="sectionTitle">Unlocked</div>

<div class="mission" onclick="startMission(1)">
Welcome to Cyrene
</div>

</div>

<!-- LOCKED -->
<div class="column">
<div class="sectionTitle">Locked</div>

<div class="mission locked">
???????
</div>

</div>

</div>

<script>
function startMission(id){
if(id === 1){
location.href = "mission1.html";
}
}
</script>

</body>
</html>

<script>

/* ================= QUEST DATA ================= */

let quests = [
{
id:1,
name:"Welcome to Cyrene",
status:"unlocked",
description:"Intro mission"
},
{
id:2,
name:"Escape Jail",
status:"hidden"
}
];

/* ================= RENDER ================= */

function renderQuests(){

let html="";

quests.forEach(q=>{

let cls="quest";

if(q.status==="locked") cls+=" locked";
if(q.status==="hidden") cls+=" hidden";
if(q.status==="completed") cls+=" completed";

let name=q.name;

/* hidden name */
if(q.status==="hidden"){
name="???";
}

/* icons */
let icon="";
if(q.status==="locked") icon=" 🔒";
if(q.status==="completed") icon=" ✔";

html+=`
<div class="${cls}" onclick="openQuest(${q.id})">
${icon} ${name}
</div>
`;

});

document.getElementById("questList").innerHTML=html;
}

renderQuests();

/* ================= CLICK ================= */

function openQuest(id){

let q=quests.find(x=>x.id===id);

/* BLOCK locked/hidden */
if(q.status==="locked" || q.status==="hidden"){
return;
}

renderOverlay(`
<div>Start "${q.name}"?</div>

<button onclick="startQuest(${id})">Yes</button>
<button onclick="closeOverlay()">No</button>
`);
}

/* ================= START ================= */

function startQuest(id){

let progress = localStorage.getItem("quest_"+id);

/* RESUME OPTION */
if(progress){

renderOverlay(`
<div>Resume quest?</div>

<button onclick="loadQuest(${id})">Resume</button>
<button onclick="restartQuest(${id})">Start Over</button>
<button onclick="closeOverlay()">Close</button>
`);

return;
}

/* NORMAL START */
loadScreen(id);
}

/* ================= LOADING ================= */

function loadScreen(id){

renderOverlay(`
<div>Loading Mission...</div>
<button onclick="loadQuest(${id})">Continue</button>
`);
}

/* ================= LOAD QUEST ================= */

function loadQuest(id){

localStorage.setItem("quest_"+id,"started");

/* QUEST 1 - SCREEN 1 */
if(id === 1){

renderOverlay(`
<div class="sectionTitle">Welcome to Cyrene</div>

<div style="
text-align:left;
max-height:60vh;
overflow-y:auto;
padding:10px;
line-height:1.6;
">

You are standing on the deck of a ferry, the metal beneath your boots humming softly with the strain of the engines as they push through restless water.

The wind feels nice and cool against your face, carrying with it the sharp scent of salt and distant smog—a strange mix of ocean spray and something more artificial.

The ferry rises and falls gently with the waves, a slow, rhythmic motion that almost feels calming—if not for the quiet tension hanging in the air around you.

<br><br>

It’s late morning, though the light feels muted, filtered through a thin haze that clings to the horizon.

As you gaze across the water, the coastline of an island starts to become visible—at first just a faint silhouette, then gradually sharpening into something more defined.

Structures begin to take shape—skyscrapers, stacked and sprawling, stretching upward and outward in uneven layers.

The skyline of a city reveals itself piece by piece, massive and imposing, like it’s watching you approach just as much as you’re observing it.

<br><br>

The closer the ferry moves, the more details emerge—faint glimmers of glass and steel catching the light, dark gaps between structures hinting at depth and density.

Even from this distance, the city feels alive… restless… as if something is always moving beneath its surface.

<br><br>

Off to your left, a dark-skinned elf leans against the railing, their posture relaxed but distant, as though lost in thought.

The wind tugs lightly at their clothing and hair, but they don’t react.

Their gaze is fixed on the water below, watching the shifting surface as it reflects fragments of light and shadow.

There’s a quiet intensity about them—the kind that suggests they’re not just looking at the water… but thinking about something far beyond it.

</div>


<button onclick="quest1Next()">Next</button>
`);
}

}

/* ================= SCREEN 2 ================= */

function quest1Next(){

renderOverlay(`
<div class="sectionTitle">What do you do?</div>

<input id="playerInput" placeholder="Type your action...">

<button onclick="handleInput()">Submit</button>
<button onclick="closeOverlay()">Back</button>
`);
}

/* ================= INPUT LOGIC ================= */

function handleInput(){

let input = document.getElementById("playerInput").value.toLowerCase();

/* ELF PATH */
if(
input.includes("elf") &&
(
input.includes("approach") ||
input.includes("walk") ||
input.includes("go") ||
input.includes("over") ||
input.includes("up")
)
){
return elfEncounter();
}

/* INVESTIGATION PATH */
if(
input.includes("explore") ||
input.includes("look") ||
input.includes("investigate") ||
input.includes("search")
){
return investigationRoll();
}

/* DEFAULT */
renderOverlay(`
<div>Nothing happens...</div>
<button onclick="quest1Next()">Try Again</button>
`);
}

/* ================= ELF ENCOUNTER ================= */

function elfEncounter(){

let playerClass = localStorage.getItem("charClass");

/* BLOCK CERTAIN CLASSES */
if(
playerClass === "Kenzai" ||
playerClass === "Rogue" ||
playerClass === "Assassin"
){
renderOverlay(`
<div>The elf barely acknowledges you... something feels off.</div>
<button onclick="closeOverlay()">Continue</button>
`);
return;
}

/* NORMAL ENCOUNTER */
renderOverlay(`
<div class="sectionTitle">Encounter</div>

<div style="text-align:left;">
The elf glances up at you and gives a subtle nod of acknowledgment.
</div>

<button onclick="charismaCheck()">Continue</button>
`);
}

/* ================= CHARISMA CHECK ================= */

function charismaCheck(){

let roll = Math.floor(Math.random()*20)+1;

renderOverlay(`
<div class="sectionTitle">Charisma Check</div>

<div>You rolled: ${roll}</div>

<button onclick="resolveCharisma(${roll})">Continue</button>
`);
}

/* ================= RESULT ================= */

function resolveCharisma(roll){

if(roll >= 11){
renderOverlay(`
<div style="color:#39ff14;">
Success. The elf seems receptive.
</div>

<button onclick="elfContinue()">Continue</button>
`);
return;
}

renderOverlay(`
<div style="color:red;">
The elf looks away. You failed.
</div>

<button onclick="elfContinue()">Continue</button>
`);
}

/* ================= CONTINUE ================= */

function elfContinue(){

renderOverlay(`
<div style="text-align:left;">
The elf finally speaks...

"First time in Cyrene?"
</div>

<button onclick="closeOverlay()">Continue</button>
`);
}

/* ================= INVESTIGATION ================= */

function investigationRoll(){

let roll = Math.floor(Math.random()*20)+1;

renderOverlay(`
<div class="sectionTitle">Investigation Roll</div>

<div>You rolled: ${roll}</div>

<button onclick="closeOverlay()">Continue</button>
`);
}

/* ================= RESTART ================= */

function restartQuest(id){
localStorage.removeItem("quest_"+id);
loadScreen(id);
}

/* ================= OVERLAY ================= */

function renderOverlay(html){
let o=document.getElementById("overlay");
o.style.display="flex";
o.innerHTML=`<div class="box">${html}</div>`;
}

function closeOverlay(){
document.getElementById("overlay").style.display="none";
}

</script>

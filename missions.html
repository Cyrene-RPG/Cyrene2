<!DOCTYPE html>
<html>
<head>
<title>Missions</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron';
color:white;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.9),rgba(0,0,0,0.95)),
url('City.jpg');
background-size:cover;
}

/* TITLE */
.title{
margin-top:40px;
font-size:28px;
color:#39ff14;
text-shadow:0 0 12px #39ff14;
}

/* CONTAINER */
.container{
width:90%;
max-width:420px;
margin:30px auto;
}

/* MISSION CARD */
.mission{
margin-top:20px;
padding:18px;
border-radius:14px;
border:2px solid #39ff14;
box-shadow:0 0 18px #39ff14;
cursor:pointer;
background:black;
transition:0.2s;
}

.mission:hover{
box-shadow:0 0 25px #39ff14;
}

/* COMPLETED */
.completed{
border:2px solid #00fff7;
box-shadow:0 0 18px #00fff7;
}

/* DESCRIPTION */
.desc{
margin-top:8px;
font-size:13px;
color:#b388ff;
}

/* BUTTON */
button{
margin-top:30px;
padding:12px;
width:90%;
max-width:300px;
background:black;
border:2px solid #39ff14;
color:#39ff14;
box-shadow:0 0 10px #39ff14;
cursor:pointer;
border-radius:10px;
}

/* OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

/* BOX */
.box{
width:90%;
max-width:350px;
padding:20px;
background:black;
border:2px solid #7a00ff;
border-radius:14px;
box-shadow:0 0 20px #7a00ff;
}
</style>
</head>

<body>

<div class="title">Missions</div>

<div class="container" id="missionList"></div>

<button onclick="location.href='profile.html'">← Back</button>

<div id="overlay" class="overlay"></div>

<script>

/* ================= MISSIONS ================= */

let missions = [
{
id:1,
name:"Welcome to Cyrene",
desc:"Arrive at the city",
completed:false
}
];

/* ================= RENDER ================= */

function renderMissions(){

let html="";

missions.forEach(m=>{

let cls="mission";
if(m.completed) cls+=" completed";

html+=`
<div class="${cls}" onclick="openMission(${m.id})">
<div>${m.name}</div>
<div class="desc">${m.desc}</div>
</div>
`;

});

document.getElementById("missionList").innerHTML=html;
}

renderMissions();

/* ================= OPEN ================= */

function openMission(id){

renderOverlay(`
<div>Start mission?</div>

<button onclick="startMission(${id})">Start</button>
<button onclick="closeOverlay()">Cancel</button>
`);
}

/* ================= START ================= */

function startMission(id){

if(id === 1){
location.href="mission1.html"; // ← your ferry page
}

}

/* ================= OVERLAY ================= */

function renderOverlay(html){
let o=document.getElementById("overlay");
o.style.display="flex";
o.innerHTML=`<div class="box">${html}</div>`;
}

function closeOverlay(){
document.getElementById("overlay").style.display="none";
}

</script>

</body>
</html>
